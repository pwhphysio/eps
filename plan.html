    a05: { name:'單腿平衡（踝部）', cat:'ankle', instructions:['用患側腳站立，靠近牆壁以確保安全。','嘗試不扶東西維持平衡。','保持膝蓋微彎。','維持指定時間。'] },
    a06: { name:'彈力帶外翻', cat:'ankle', instructions:['坐著，將彈力帶繞在前腳掌，固定在內側。','將腳向外翻，對抗彈力帶的阻力。','短暫維持。','緩慢回到起始位置後重複。'] },
    a07: { name:'彈力帶內翻', cat:'ankle', instructions:['坐著，將彈力帶繞在前腳掌，固定在外側。','將腳向內翻，對抗彈力帶的阻力。','短暫維持。','緩慢回到起始位置後重複。'] },
    a08: { name:'腳跟行走', cat:'ankle', instructions:['雙腳與髖同寬站立。','將腳尖抬離地面，用腳跟行走。','向前走20步。','全程保持良好姿勢。'] },
    a09: { name:'腳尖行走', cat:'ankle', instructions:['雙腳與髖同寬站立。','踮起腳尖。','用腳尖向前走20步。','全程保持良好姿勢。'] },
    a10: { name:'BOSU 球平衡', cat:'ankle', instructions:['單腳或雙腳站在 BOSU 球上。','嘗試維持平衡。','從雙腳開始，逐漸進階到單腳。','旁邊放一面牆壁以確保安全。'] }
};

var CAT_LABELS = { scoliosis:'脊柱側彎', knee:'膝蓋', shoulder:'肩膀', back:'背部', hip:'髖部', neck:'頸部', ankle:'踝部' };

var SUBCAT_LABELS = {
    'psse-thoracic': 'PSSE 胸椎 Thoracic',
    'psse-lumbar': 'PSSE 腰椎 Lumbar',
    'psse-double': 'PSSE 雙彎 Double Curve',
    'relaxed-posture': '放鬆姿勢 Relaxed Posture',
    'gait': '步態 Gait',
    'sagittal': '矢狀面矯正 Sagittal Plane',
    'strengthening': '強化運動 Strengthening',
    'stretching': '伸展運動 Stretching'
};

function extractYouTubeID(input) {
    if (!input) return null;
    input = input.trim();
    var shortMatch = input.match(/youtu\.be\/([A-Za-z0-9_-]{11})/);
    if (shortMatch) return shortMatch[1];
    var longMatch = input.match(/[?&]v=([A-Za-z0-9_-]{11})/);
    if (longMatch) return longMatch[1];
    var embedMatch = input.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{11})/);
    if (embedMatch) return embedMatch[1];
    if (/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
    return null;
}

function parseURL() {
    var params = new URLSearchParams(window.location.search);
    var exParam = params.get('ex');
    if (!exParam) return [];

    var items = exParam.split(',');
    var result = [];

    for (var i = 0; i < items.length; i++) {
        var item = items[i].trim();
        var code, sets = 0, reps = 0, hold = 0, freq = 'daily';
        var breathingCycles = 0, minutes = 0;

        var parts = item.split('.');
        if (parts.length > 1) freq = parts[1];

        var main = parts[0].split(':');
        code = main[0];

        if (main.length > 1) {
            var prescription = main[1];

            /* b5 → 5 breathing cycles */
            var bMatch = prescription.match(/^b(\d+)$/i);
            /* m15 → 15 minutes */
            var mMatch = prescription.match(/^m(\d+)$/i);
            /* r5 → 5 repetitions */
            var rMatch = prescription.match(/^r(\d+)$/i);

            if (bMatch) {
                breathingCycles = parseInt(bMatch[1]);
            } else if (mMatch) {
                minutes = parseInt(mMatch[1]);
            } else if (rMatch) {
                reps = parseInt(rMatch[1]);
            } else {
                /* 3x10 → 3 sets of 10 (reps or seconds depending on unit) */
                var xMatch = prescription.match(/(\d+)x(\d+)/);
                if (xMatch) { sets = parseInt(xMatch[1]); reps = parseInt(xMatch[2]); }
                var hMatch = prescription.match(/h(\d+)/);
                if (hMatch) hold = parseInt(hMatch[1]);
            }
        } else {
            /* No prescription specified – use sensible defaults */
            var exData = EXERCISES[code];
            if (exData && exData.unit) {
                switch (exData.unit) {
                    case 'reps':          reps = 5; break;
                    case 'breathing':     breathingCycles = 5; break;
                    case 'minutes':       minutes = 10; break;
                    case 'seconds-sets':  sets = 3; reps = 30; break;
                    default:              sets = 3; reps = 10; break;
                }
            } else {
                sets = 3; reps = 10;
            }
        }

        if (EXERCISES[code]) {
            result.push({
                code: code,
                sets: sets,
                reps: reps,
                hold: hold,
                freq: freq,
                breathingCycles: breathingCycles,
                minutes: minutes
            });
        }
    }
    return result;
}

function toggleVideo(code, videoId) {
    var section = document.getElementById('vid-' + code);
    var thumb = section.querySelector('.video-thumbnail');
    var player = section.querySelector('.video-player');
    var btn = section.querySelector('.video-btn');

    if (player.style.display === 'none' || player.style.display === '') {
        thumb.style.display = 'none';
        player.style.display = 'block';
        player.innerHTML = '<div class="video-player-inner"><iframe src="https://www.youtube.com/embed/' + videoId + '?rel=0&autoplay=1" allow="autoplay" allowfullscreen loading="lazy"></iframe></div>';
        btn.textContent = '\u2715  隱藏影片';
    } else {
        player.style.display = 'none';
        player.innerHTML = '';
        thumb.style.display = 'block';
        btn.textContent = '\u25B6  觀看影片';
    }
}

function render() {
    var exercises = parseURL();
    var container = document.getElementById('content');

    if (exercises.length === 0) {
        container.innerHTML = '<div class="error"><h2>找不到運動項目</h2><p>請掃描物理治療師提供的有效 QR 碼。</p></div>';
        return;
    }

    var html = '';
    var freqLabels = { 'daily':'每天', '2x-daily':'每天兩次', '3x-week':'每週三次', 'alternate':'隔天' };

    for (var i = 0; i < exercises.length; i++) {
        var ex = exercises[i];
        var data = EXERCISES[ex.code];
        var videoId = data.video ? extractYouTubeID(data.video) : null;
        var unit = data.unit || 'sets-reps';

        html += '<div class="exercise-card">';
        html += '<span class="category cat-' + data.cat + '">' + CAT_LABELS[data.cat] + '</span>';

        /* Subcategory badge */
        if (data.subcat && SUBCAT_LABELS[data.subcat]) {
            html += '<span class="subcat">' + SUBCAT_LABELS[data.subcat] + '</span>';
        }

        html += '<span class="code">' + ex.code.toUpperCase() + '</span>';
        html += '<h2>' + (i + 1) + '. ' + data.name + '</h2>';

        /* English name */
        if (data.nameEn) {
            html += '<p class="name-en">' + data.nameEn + '</p>';
        }

        /* ── Exercise image ── */
        if (data.image) {
            var isMulti = Array.isArray(data.image);
            html += '<div class="exercise-image' + (isMulti ? ' multi' : '') + '">';
            if (isMulti) {
                for (var k = 0; k < data.image.length; k++) {
                    html += '<img src="' + IMAGE_BASE_PATH + data.image[k] + '" alt="' + data.name + '" onerror="this.style.display=\'none\'">';
                }
            } else {
                html += '<img src="' + IMAGE_BASE_PATH + data.image + '" alt="' + data.name + '" onerror="this.style.display=\'none\'">';
            }
            html += '</div>';
        }

        /* ── Parameters ── */
        html += '<div class="params">';

        if (ex.breathingCycles > 0) {
            html += '<div class="param"><div class="value">' + ex.breathingCycles + '</div><div class="label">呼吸循環<br>Breathing Cycles</div></div>';
        } else if (ex.minutes > 0) {
            html += '<div class="param"><div class="value">' + ex.minutes + '</div><div class="label">分鐘<br>Minutes</div></div>';
        } else if (unit === 'seconds-sets') {
            if (ex.sets > 0) html += '<div class="param"><div class="value">' + ex.sets + '</div><div class="label">組 Sets</div></div>';
            if (ex.reps > 0) html += '<div class="param"><div class="value">' + ex.reps + '</div><div class="label">秒 Seconds</div></div>';
        } else if (unit === 'reps') {
            if (ex.reps > 0) html += '<div class="param"><div class="value">' + ex.reps + '</div><div class="label">次 Reps</div></div>';
        } else {
            /* Default: sets-reps (existing exercises) */
            if (ex.sets > 0) html += '<div class="param"><div class="value">' + ex.sets + '</div><div class="label">組數</div></div>';
            if (ex.reps > 0) html += '<div class="param"><div class="value">' + ex.reps + '</div><div class="label">次數</div></div>';
            if (ex.hold > 0) html += '<div class="param"><div class="value">' + ex.hold + '秒</div><div class="label">維持</div></div>';
        }

        html += '<div class="param"><div class="value">' + (freqLabels[ex.freq] || ex.freq) + '</div><div class="label">頻率</div></div>';
        html += '</div>';

        /* ── Video ── */
        if (videoId) {
            html += '<div class="video-section" id="vid-' + ex.code + '">';
            html += '<div class="video-thumbnail" onclick="toggleVideo(\'' + ex.code + '\',\'' + videoId + '\')">';
            html += '<img src="https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg" alt="影片縮圖">';
            html += '<div class="play-overlay">\u25B6</div>';
            html += '</div>';
            html += '<div class="video-player"></div>';
            html += '<button class="video-btn" onclick="toggleVideo(\'' + ex.code + '\',\'' + videoId + '\')">\u25B6  觀看影片</button>';
            html += '</div>';
        }

        /* ── Instructions ── */
        html += '<div class="instructions"><strong>動作說明：</strong><ol>';
        for (var j = 0; j < data.instructions.length; j++) {
            html += '<li>' + data.instructions[j] + '</li>';
        }
        html += '</ol></div>';
        html += '</div>';
    }

    container.innerHTML = html;
}

render();
</script>

</html>
