/* ============================================================
   FREQUENCY MAP
   ============================================================ */
var FREQ = {
    'daily': '每天',
    '2x-daily': '每天兩次',
    '3x-week': '每週三次',
    'alternate': '隔天一次'
};

/* ============================================================
   CATEGORY LABELS
   ============================================================ */
var CAT_LABELS = {
    'scoliosis': '脊柱側彎',
    'knee': '膝部',
    'shoulder': '肩部',
    'back': '背部',
    'hip': '髖部',
    'neck': '頸部',
    'ankle': '踝部'
};

/* ============================================================
   PARSE URL & RENDER
   ============================================================ */
function parseURL() {
    var params = new URLSearchParams(window.location.search);
    var ex = params.get('ex');
    if (!ex) return null;

    var items = ex.split(',');
    var result = [];
    for (var i = 0; i < items.length; i++) {
        var m = items[i].match(/^(\w+):(\d+)x(\d+)(?:h(\d+))?(?:\.(.+))?$/);
        if (m) {
            result.push({
                code: m[1],
                sets: parseInt(m[2]),
                reps: parseInt(m[3]),
                hold: m[4] ? parseInt(m[4]) : 0,
                freq: m[5] || 'daily'
            });
        }
    }
    return result.length > 0 ? result : null;
}

function getYouTubeId(url) {
    if (!url || url === 'PASTE_YOUTUBE_LINK_HERE') return null;
    var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?\s]{11})/);
    return m ? m[1] : null;
}

function render() {
    var plan = parseURL();
    var container = document.getElementById('planContent');

    if (!plan) {
        container.innerHTML = '<div class="error-msg">⚠️ 未找到運動計劃資料。<br>No exercise plan data found.<br><br>請透過治療師提供的連結或QR碼開啟此頁面。</div>';
        return;
    }

    var html = '';
    for (var i = 0; i < plan.length; i++) {
        var item = plan[i];
        var ex = DB[item.code];
        if (!ex) continue;

        var catClass = 'cat-' + ex.cat;
        var catLabel = CAT_LABELS[ex.cat] || ex.cat;

        html += '<div class="exercise-card ' + catClass + '">';
        html += '<div class="card-header">';
        html += '<div class="num">' + (i + 1) + '</div>';
        html += '<div class="title">';
        html += '<div class="zh">' + ex.zh + '</div>';
        html += '<div class="en">' + ex.en + ' (' + catLabel + ')</div>';
        html += '</div></div>';

        html += '<div class="card-body">';

        /* Parameters */
        html += '<div class="params">';
        html += '<span class="param-tag">📊 ' + item.sets + ' 組 × ' + item.reps + ' 次</span>';
        if (item.hold > 0) {
            html += '<span class="param-tag">⏱️ 維持 ' + item.hold + ' 秒</span>';
        }
        html += '<span class="param-tag">📅 ' + (FREQ[item.freq] || item.freq) + '</span>';
        html += '</div>';

        /* Steps */
        html += '<div class="steps-title">📝 動作步驟：</div>';
        html += '<div class="steps"><ol>';
        for (var s = 0; s < ex.steps.length; s++) {
            html += '<li>' + ex.steps[s] + '</li>';
        }
        html += '</ol></div>';

        /* Video */
        var videoId = getYouTubeId(ex.video);
        if (videoId) {
            html += '<div class="video-section">';
            html += '<div class="vid-title">🎬 示範影片：</div>';
            html += '<div class="video-container">';
            html += '<iframe src="https://www.youtube.com/embed/' + videoId + '" allowfullscreen></iframe>';
            html += '</div></div>';
        }

        html += '</div></div>';
    }

    if (!html) {
        container.innerHTML = '<div class="error-msg">⚠️ 無法識別任何運動代碼。<br>Could not recognise any exercise codes.</div>';
        return;
    }

    container.innerHTML = html;
}

render();
